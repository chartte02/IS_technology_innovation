# ============================================================
# 常见网络攻击检测系统 — 全局配置文件
# 所有模块的配置项统一管理在此文件中
# ============================================================

# --- 系统配置 ---
system:
  name: "Network Attack Detection System (NADS)"
  version: "1.0.0"
  log_level: "INFO"           # DEBUG | INFO | WARNING | ERROR
  log_dir: "./logs"
  log_file: "ids.log"

# --- 网络抓包配置 ---
capture:
  interface: null              # 网卡接口名，null 表示自动选择（Windows: 需手动指定）
  # Windows 示例: "\\Device\\NPF_{GUID}" 或使用 scapy 的 iface 参数
  # Linux 示例: "eth0"
  promiscuous: true            # 混杂模式
  snaplen: 65535               # 最大抓包长度（字节）
  timeout: 1000                # 超时时间（毫秒）
  buffer_size: 104857600       # 环形缓冲区大小（100MB）
  filter_rule: "tcp"           # BPF 过滤规则：tcp / ip / tcp port 80 / etc.
  # 高级过滤示例: "tcp and (port 80 or port 443 or port 22 or port 21)"

# --- 特征库配置 ---
signatures:
  directory: "./signatures"    # 特征库文件目录
  enable_regex: true           # 启用正则表达式匹配
  enable_aho_corasick: true    # 启用 AC 自动机加速
  case_sensitive: false        # 是否区分大小写（默认不区分）
  # 白名单与上下文过滤（PDF扩展：误报自动降噪）
  whitelist_ips: []            # 白名单IP，来自这些IP的告警直接忽略
  # 示例: ["192.168.1.1", "10.0.0.254"]  (安全扫描器IP)
  internal_prefixes:           # 内网IP前缀，内网攻击可升级严重度
    - "192.168."
    - "10."
    - "172.16."

# --- 异常检测配置 ---
anomaly:
  # 滑动窗口参数
  time_window: 60              # 统计窗口（秒）
  bucket_size: 5               # 时间桶粒度（秒）

  # 端口扫描检测阈值
  port_scan:
    unique_ports_threshold: 10      # 60秒内访问10+不同端口 → 端口扫描（调优后）
  horizontal_scan:
    unique_ips_threshold: 20        # 60秒内访问20+不同IP → 横向扫描（调优后）
  brute_force:
    login_fail_threshold: 3         # 60秒内3次登录失败 → 暴力破解（调优后）
  syn_flood:
    syn_threshold: 500              # 500个SYN包（调优后，原1000偏松）
    syn_ratio: 0.8                  # SYN占比阈值（80%）
  ddos:
    pps_threshold: 10000            # 每秒包数阈值

  # 基线学习参数
  baseline_learning_period: 3600    # 基线学习时长（秒），建议至少1小时
  baseline_update_interval: 300     # 基线更新间隔（秒）

  # ML 异常检测（PDF必做：Isolation Forest 识别未知攻击）
  ml_detection:
    enabled: false                   # 是否启用 ML 检测（需安装 scikit-learn）
    n_estimators: 100                # Isolation Forest 树的数量
    contamination: 0.05              # 预期异常比例（默认5%）
    min_samples: 20                  # 最小训练样本数
    max_samples: 'auto'              # 每棵树的最大样本数
    random_state: 42                 # 随机种子（保证可复现）

  # 自适应阈值（选做：μ±kσ 动态阈值）
  adaptive_threshold:
    enabled: true                      # 是否启用自适应阈值
    k: 3.0                             # 标准差倍数，3 = μ+3σ（99.7% 正常范围）
    min_samples: 10                    # 开始动态计算的最小样本数
    window_size: 200                   # 滑动窗口大小

  # 两阶段异常检测（IF + RF，参考 R6 两阶段方案）
  # Stage1: IsolationForest 无监督快速筛选
  # Stage2: RandomForest 监督精判，降低误报
  two_stage:
    enabled: false                     # 是否启用（需安装 scikit-learn）
    feeding: true                      # 是否自动喂养标签数据（从规则引擎结果提取）
    min_feed: 50                       # RF 训练前最少喂养样本数
    rf_n_estimators: 100               # RandomForest 树数
    rf_max_depth: 10                   # 树的最大深度
    rf_min_samples_split: 5            # 内部节点最小样本数
    rf_random_state: 42

# --- 告警配置 ---
alert:
  enable_console_output: true      # 控制台实时输出
  enable_file_log: true            # 文件日志
  enable_json_export: true         # JSON 导出
  json_export_file: "./alerts.json"
  dedup_window: 10                 # 告警去重窗口（秒）
  max_alerts_in_memory: 10000      # 内存中最大告警数

# --- TCP 流重组配置 ---
tcp_reassembly:
  enabled: true                    # 是否启用流重组
  stream_timeout: 300              # 流超时（秒）
  max_stream_size: 10485760        # 单流最大缓存（10MB）
  max_concurrent_streams: 1000     # 最大并发流数

# --- GUI 配置 ---
gui:
  theme: "dark"                    # dark | light
  refresh_interval: 1000           # 界面刷新间隔（毫秒）
  max_display_alerts: 500          # 界面最大显示告警数
  chart_points: 60                 # 实时图表数据点数

# --- 速率限制 ---
rate_limit:
  max_pps: 20000                # 单IP最大包速率, 0=关闭
  burst: 1000                   # 突发容忍量

# --- 资产重要性配置（PDF必做：误报自动降噪）---
# 不同重要性的资产，同类告警可升降级处理
assets:
  # 高重要性资产：告警自动升级
  critical:
    - "192.168.1.0/24"             # 核心服务器网段
  # 中重要性资产：保持原始 severity
  important:
    - "10.0.1.0/24"                # 业务服务器网段
  # 低重要性资产：告警自动降级
  normal:
    - "192.168.100.0/24"           # 客户端子网
  # 白名单：完全忽略告警
  whitelist:
    - "192.168.1.1"                # 安全扫描器 / 监控系统

# --- 攻击链关联分析配置（PDF必做）---
attack_chain:
  enabled: false                   # 是否启用攻击链关联
  time_window: 300                 # 关联时间窗口（秒），同一源 IP 在此窗口内的告警视为同一攻击链
  min_alerts: 3                    # 最少告警数才构成攻击链
  stages:                          # 攻击阶段定义
    - "scan"                       # 侦察扫描
    - "brute_force"                # 暴力破解 / 漏洞利用
    - "backdoor"                   # 后门 / C2 通信
    - "dos"                        # DoS / DDoS 攻击

# --- 威胁情报集成（扩展功能）---
threat_intel:
  enabled: false                   # 是否启用
  abuseipdb_api_key: ""            # AbuseIPDB API Key
  alienvault_otx_api_key: ""       # AlienVault OTX API Key
  local_blacklist: "./blacklist.txt"
