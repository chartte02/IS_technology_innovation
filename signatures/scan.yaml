# ============================================================
# 扫描探测特征库
# ============================================================

# --- 端口扫描特征 ---
- id: SCAN-001
  name: "Port Scan - Nmap SYN Scan"
  category: scan
  severity: medium
  patterns:
    - "(?i)nmap"
    - "(?i)Nmap Scripting Engine"

- id: SCAN-002
  name: "Port Scan - Masscan Detection"
  category: scan
  severity: medium
  patterns:
    - "(?i)masscan"

# --- 漏洞扫描器 ---
- id: SCAN-003
  name: "Vulnerability Scanner - Nikto"
  category: scan
  severity: medium
  protocols: [HTTP]
  ports: [80, 443, 8080, 8443]
  patterns:
    - "(?i)Nikto"
    - "(?i)nikto/[0-9.]+"

- id: SCAN-004
  name: "Vulnerability Scanner - Nessus"
  category: scan
