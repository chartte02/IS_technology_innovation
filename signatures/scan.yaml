# --- 敏感路径探测 ---
- id: SCAN-008
  name: "Scan - Sensitive Path Probing"
  category: scan
  severity: medium
  protocols: [HTTP]
  ports: [80, 443, 8080, 8443]
  patterns:
    - "(?i)/phpmyadmin"
    - "(?i)/phpMyAdmin"
    - "(?i)/wp-admin"
    - "(?i)/wp-login"
    - "(?i)/administrator"
    - "(?i)/manager/html"
    - "(?i)/solr/admin"
    - "(?i)/actuator"
    - "(?i)/swagger"
    - "(?i)/api-docs"
