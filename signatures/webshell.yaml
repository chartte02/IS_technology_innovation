    - "(?i)Server\\.CreateObject\\s*\\(\\s*['\"]Adodb\\.Stream['\"]"
    - "(?i)Eval\\s*\\(\\s*Request\\s*\\(\\s*['\"]"
    - "(?i)Execute\\s*\\(\\s*Request\\s*\\(\\s*['\"]"
